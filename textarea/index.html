<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> TESTAREA </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <form>
            <h2>
                 formulario de contacto
            </h2>
            <div class="form_input">
                <label>Nombre completo
                <input type="text" placeholder="John Doe" >
            </label>
            </div>
            <div class="form_input">
                <label for="gmail">Gmail</label>
                <input type="email" placeholder="ejmeplo@gmail.com" id="gmail">
            </div>

            <div class="form_input">
                <label for="mensaje">Mensaje</label>
                <textarea maxlength="140" placeholder="deja tu mensaje..." id="mensaje"></textarea><!--es un elemento en el que pueden escribir en ese elemento-->
                <!--rows="2": asi se pone la cantidad de lineas que se le van a permitir a el usuario-->

            </div>
            
            <div class="form_input">
                <label >acepta los terminos y condiciones<input type="checkbox" class="checbox">
                </label>

            </div>
        </form>
    </body>
</html>
