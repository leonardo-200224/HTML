<!DOCTYPE html>
<html lang="es"><!--lang="": se le dice en que lenguaje esta la pagina a el buscador-->

    <head>
        <meta charset="UTF-8"><!--es una etiqueta que le dice  a el documento cual es la cofiguracon que va a utilizar-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--adapta nuestra pagina a todos los dispositivos-->

        <meta name="description " content="esta pagina web se trata de ..................."> 

        <meta name="keywords" content="aca,van,todas,las,palabras,clavez,separadas,por,coma">

        <meta name="author" charset="lucas dalto">

        <meta name="robots" content="nofollow"><!--no muestra tu pagina en los resultados de busqueda-->

        <meta name="robots" charset="nosnippet"><!--para que no se meustre un fracmento de la pagina en un navegador-->

        <meta name="robots" charset="noarchive"><!--el navegador no puede archivar tu pagina-->

        <meta name="robots" content="noimageindex"><!--no se puede buscar la imagen-->

        <meta name="title" content="aprendiendo a programar"><!--titulo de la pagina-->


        <title> comentarios, metatags y favicons</title>
        <link rel="icon" href="img/12.png" type="image/png"><!--poner icono que tiene que ser 64 x 64-->
        <!--el type es para que el ordenador lo identifique mas rapido-->
        <link rel="stylesheet" href="style.css">

    </head>
    <body>
        <!--esto es un titulo-->
        <h1> hkaaskfkajfklajfljafjkajfla </h1>

    </body>

</html>
